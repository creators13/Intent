<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Thread</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>Thread</h1>
      <section id="status"></section>
      <div id="popup-error" class="form-error" hidden></div>
      <section id="active-session-card" class="card" hidden>
        <h2>Current Session</h2>
        <div id="active-session-details" class="session-details"></div>
      </section>

      <section id="learn-card" class="card">
        <h2>Start Learn Session</h2>
        <div class="field">
          <label for="learn-topic">What topic(s) do I want to learn about in this session?</label>
          <textarea id="learn-topic" class="autogrow-textarea" placeholder="e.g. Python decorators"></textarea>
        </div>
        <div class="field">
          <label for="learn-goal">What is my goal to reach by the end of this session?</label>
          <textarea id="learn-goal" class="autogrow-textarea" placeholder="e.g. Build and understand one example"></textarea>
        </div>
        <div class="field">
          <label for="learn-purpose">What is my purpose for this learning?</label>
          <textarea id="learn-purpose" placeholder="Short reflection"></textarea>
        </div>
        <div class="field">
          <label for="learn-timing">Is now an appropriate time for this learning?</label>
          <textarea id="learn-timing" placeholder="Short reflection"></textarea>
        </div>
        <button id="start-learn">Start Learn Session</button>
      </section>

      <section id="relax-card" class="card">
        <h2>Start Relax Session</h2>
        <div class="field">
          <label for="relax-current">How do I currently feel?</label>
          <textarea id="relax-current" class="autogrow-textarea" placeholder="e.g. Stressed, tired"></textarea>
        </div>
        <div class="field">
          <label for="relax-want">How do I want to feel?</label>
          <textarea id="relax-want" class="autogrow-textarea" placeholder="e.g. Calm and refreshed"></textarea>
        </div>
        <div class="field">
          <label for="relax-other">What else can help me now?</label>
          <textarea id="relax-other" class="autogrow-textarea" placeholder="e.g. Walk, stretch, water"></textarea>
        </div>
        <div class="field">
          <label for="relax-tomorrow">What am I going to do after this relax session? Why is it important that I follow through?</label>
          <textarea id="relax-tomorrow" class="autogrow-textarea" placeholder="e.g. Sleep by 11pm"></textarea>
        </div>
        <div id="relax-duration-field" class="field">
          <label for="relax-duration">How long should my session be (minutes)?</label>
          <input id="relax-duration" type="number" min="1" max="240" value="30" />
        </div>
        <div class="field">
          <label for="relax-why">Why is this the right length for me?</label>
          <textarea id="relax-why" placeholder="Short reflection"></textarea>
        </div>
        <button id="start-relax">Start Relax Session</button>
      </section>

      <section class="row card actions-card">
        <button id="end-session" class="secondary">End Session</button>
        <button id="open-dashboard" class="secondary">Open Dashboard</button>
      </section>

      <section class="card">
        <h2>Evaluation Debug</h2>
        <div class="row debug-actions">
          <button id="export-debug-logs" class="secondary">Export Debug Logs</button>
          <button id="clear-debug-logs" class="secondary">Clear Debug Logs</button>
        </div>
        <pre id="eval-debug" class="debug-panel">Waiting for evaluation debug data…</pre>
      </section>

      <section class="card">
        <h2>Video Evaluation Trace</h2>
        <div id="video-trace" class="trace-table-wrap">Waiting for evaluations…</div>
      </section>

      <section class="card">
        <h2>Evaluation Settings</h2>
        <div class="field">
          <label for="reload-wait-seconds">Reload wait (seconds)</label>
          <input id="reload-wait-seconds" type="number" min="0.5" max="15" step="0.1" value="3" />
        </div>
        <div class="field">
          <label for="meta-timeout-seconds">Metadata timeout (seconds)</label>
          <input id="meta-timeout-seconds" type="number" min="1" max="15" step="0.1" value="5" />
        </div>
        <div class="field">
          <label for="strictness-slider">Strictness (left = stricter, right = more lenient)</label>
          <input id="strictness-slider" type="range" min="0" max="100" step="1" value="80" />
          <div id="strictness-summary" class="settings-note">Relevant cutoff: 0.600 · Borderline cutoff: 0.550</div>
        </div>
        <button id="save-eval-settings">Save Evaluation Settings</button>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
